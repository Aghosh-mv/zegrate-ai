<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zegrate AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon">Z</div>
          <span>Zegrate AI</span>
        </div>
        <button id="newChatBtn" class="new-chat-btn">+ New Chat</button>
      </div>
      <div id="conversationList" class="conversation-list"></div>
      <div class="sidebar-footer">
        <div class="model-select-wrap">
          <label class="sidebar-label">Model</label>
          <select id="modelSelect" class="model-select"></select>
        </div>
        <div class="param-controls">
          <div class="param-row">
            <label class="sidebar-label">Temperature</label>
            <div class="param-input-row">
              <input type="range" id="tempSlider" class="param-slider" min="0" max="2" step="0.05" value="0.7">
              <span id="tempValue" class="param-value">0.70</span>
            </div>
          </div>
        </div>
      </div>
    </aside>

    <main id="mainArea" class="main-area">
      <header class="main-header">
        <button id="sidebarToggle" class="icon-btn sidebar-toggle" title="Toggle sidebar">&#9776;</button>
        <div class="header-info">
          <span id="currentModelName" class="model-name">Select a model</span>
          <span id="modelStatus" class="model-status idle">Idle</span>
        </div>
        <button id="themeToggle" class="icon-btn" title="Toggle theme">&#9790;</button>
      </header>

      <div id="chatContainer" class="chat-container">
        <div id="welcomeScreen" class="welcome-screen">
          <div class="welcome-content">
            <div class="welcome-icon">Z</div>
            <h1>Zegrate AI</h1>
            <p>Choose a model to start chatting.<br>All data stays on your machine.</p>
            <div class="model-cards" id="modelCards"></div>
          </div>
        </div>
        <div id="chatMessages" class="chat-messages" style="display:none"></div>
      </div>

      <div class="input-area">
        <div class="input-wrapper">
          <textarea id="messageInput" placeholder="Send a message..." rows="1" disabled></textarea>
          <div class="input-actions">
            <button id="stopBtn" class="stop-btn" title="Stop generating" style="display:none">
              <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
            </button>
            <button id="sendBtn" class="send-btn" disabled>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="input-footer">Your data stays on your machine</div>
      </div>
    </main>
  </div>

  <script src="/static/js/chat.js"></script>
</body>
</html>
